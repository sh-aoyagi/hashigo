<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>はしご酒ルーレット</title>
  <style>
    :root {
      --bg: #0b0b12;
      --text: #f7f7fb;
      --accent: #ffcf6e;
      --neon-pink: #ff4fd8;
      --neon-blue: #54d7ff;
      --neon-green: #7dff9e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif; }

    body {
      background:
        radial-gradient(circle at top, rgba(84,215,255,0.14), transparent 22%),
        radial-gradient(circle at 80% 10%, rgba(255,79,216,0.13), transparent 18%),
        radial-gradient(circle at center bottom, rgba(125,255,158,0.08), transparent 20%),
        linear-gradient(180deg, #0b0b12 0%, #101018 45%, #09090f 100%);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    .background-comments {
      position: absolute; inset: 0; overflow: hidden; z-index: 0; pointer-events: none;
    }
    .comment {
      position: absolute; white-space: nowrap; font-size: 14px; opacity: 0.16;
      color: rgba(255,255,255,0.9); animation: flow linear infinite;
      text-shadow: 0 0 8px rgba(255,255,255,0.08);
    }
    @keyframes flow {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-120vw); }
    }

    .container {
      position: relative; z-index: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; height: 100vh;
      padding: 20px; text-align: center; backdrop-filter: blur(2px);
    }
    .screen { width: 100%; max-width: 420px; }

    .home-wrap, .roulette-screen, .result-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; width: 100%;
    }
    .home-wrap.active, .roulette-screen.active, .result-screen.active { display: flex; }

    .logo {
      font-size: clamp(34px, 10vw, 46px); font-weight: 900; line-height: 1.05;
      margin-bottom: 14px; letter-spacing: 0.04em; color: #ffffff;
      text-shadow: 0 0 6px rgba(255,255,255,0.35), 0 0 16px rgba(84,215,255,0.28),
        0 0 28px rgba(255,79,216,0.22), 0 0 42px rgba(255,207,110,0.16);
      animation: neonFlicker 3.2s infinite;
    }
    .logo .line { display: inline-block; position: relative; }
    .logo .line::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: 2px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
      filter: blur(1px); opacity: 0.7; animation: neonScan 2.4s infinite linear;
    }
    @keyframes neonFlicker {
      0%, 18%, 22%, 35%, 38%, 100% { opacity: 1; filter: brightness(1); }
      19%, 21%, 36%, 37% { opacity: 0.72; filter: brightness(1.12); }
      60% { opacity: 0.9; } 62% { opacity: 0.55; } 64% { opacity: 1; }
    }
    @keyframes neonScan {
      0% { transform: translateX(-100%); opacity: 0; }
      20% { opacity: 0.75; } 50% { opacity: 0.55; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    .catch { font-size: 16px; color: var(--accent); margin-bottom: 6px; font-weight: 800; text-shadow: 0 0 12px rgba(255,207,110,0.18); }
    .sub { font-size: 14px; opacity: 0.72; margin-bottom: 18px; }
    .location-badge {
      font-size: 12px; padding: 5px 12px; border-radius: 999px; margin-bottom: 14px;
      background: rgba(125,255,158,0.12); border: 1px solid rgba(125,255,158,0.25);
      color: var(--neon-green); font-weight: 700;
    }
    .location-badge.denied {
      background: rgba(255,100,100,0.10); border-color: rgba(255,100,100,0.25); color: #ff8888;
    }

    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      width: 100%; max-width: 340px; margin-bottom: 28px;
    }
    .roulette-btn, .action-btn, .share-btn {
      border: none; border-radius: 18px; cursor: pointer;
      transition: 0.15s ease; box-shadow: 0 8px 26px rgba(0,0,0,0.32);
    }
    .roulette-btn {
      padding: 22px 10px; font-size: 20px; font-weight: 900; color: white;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.10);
    }
    .roulette-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .roulette-btn:active:not(:disabled), .action-btn:active, .share-btn:active { transform: scale(0.96); }

    .sns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; opacity: 0.84; font-size: 13px; font-weight: 700; }
    .sns span { border: 1px solid rgba(255,255,255,0.14); padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.05); }

    .roulette-screen { gap: 18px; }
    .roulette-ui {
      width: min(82vw, 320px); aspect-ratio: 1 / 1; position: relative;
      margin: 0 auto; filter: drop-shadow(0 20px 36px rgba(0,0,0,0.45));
    }
    .roulette-pointer {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 14px solid transparent;
      border-right: 14px solid transparent; border-bottom: 26px solid #ffffff;
      z-index: 5; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }
    .roulette-wheel {
      position: absolute; inset: 0; border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.9) 0 10%, transparent 11%),
        conic-gradient(from -18deg, #ff4fd8 0 25%, #54d7ff 25% 50%, #ffcf6e 50% 75%, #7dff9e 75% 100%);
      border: 12px solid rgba(255,255,255,0.9);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.24), 0 0 28px rgba(84,215,255,0.12);
      transform: rotate(0deg); overflow: hidden;
    }
    .roulette-wheel::before {
      content: ""; position: absolute; inset: 12px; border-radius: 50%;
      background: radial-gradient(circle at center, rgba(15,15,22,0.92) 0 25%, transparent 25.5%),
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 65%);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }
    .roulette-wheel::after {
      content: "DART"; position: absolute; inset: 50% auto auto 50%;
      transform: translate(-50%, -50%); font-size: 14px; font-weight: 900;
      letter-spacing: 0.18em; color: rgba(255,255,255,0.95);
      text-shadow: 0 0 8px rgba(255,255,255,0.35), 0 0 16px rgba(255,79,216,0.35); z-index: 2;
    }
    .dart-hit {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 16px; background: #fff; border-radius: 50%;
      opacity: 0; z-index: 6; box-shadow: 0 0 18px rgba(255,255,255,0.8);
    }
    .dart-hit.show { animation: dartHit 420ms ease-out forwards; }
    @keyframes dartHit {
      0% { opacity: 0; transform: translateX(-50%) scale(0.2); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.4); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    .roulette-status { font-size: 14px; opacity: 0.75; }
    .roulette-label { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.14); }
    .roulette-spin { animation: wheelSpin 1.8s cubic-bezier(0.12, 0.74, 0.12, 1) forwards; }
    @keyframes wheelSpin {
      0%   { transform: rotate(0deg); }
      70%  { transform: rotate(1360deg); }
      86%  { transform: rotate(1495deg); }
      94%  { transform: rotate(1542deg); }
      100% { transform: rotate(var(--final-rotation, 1575deg)); }
    }

    .result-card {
      width: 100%; max-width: 360px; padding: 18px 16px 20px; border-radius: 24px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 14px 38px rgba(0,0,0,0.35); backdrop-filter: blur(10px);
    }
    .typing-line {
      min-height: 42px; font-size: clamp(22px, 7vw, 34px); font-weight: 900;
      letter-spacing: 0.02em; margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(255,255,255,0.18), 0 0 20px rgba(84,215,255,0.16);
    }
    .typing-line .cursor {
      display: inline-block; width: 10px; margin-left: 4px;
      color: var(--accent); animation: blink 0.9s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .store-desc { opacity: 0.72; margin-bottom: 10px; font-size: 13px; line-height: 1.6; }
    .store-details { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    .store-detail-row { font-size: 13px; opacity: 0.82; display: flex; align-items: center; gap: 6px; }
    .store-detail-row a { color: var(--neon-blue); text-decoration: none; }

    .action-title { font-size: 22px; font-weight: 900; margin-bottom: 14px; letter-spacing: 0.03em; }
    .action-buttons { display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 10px; margin: 0 auto; }
    .action-btn {
      display: block; padding: 15px 16px; font-size: 17px; font-weight: 900;
      background: white; color: black; text-decoration: none; text-align: center;
      cursor: pointer;
    }
    .ghost { background: rgba(255,255,255,0.10); color: white; border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px); }
    .tel-btn { background: var(--neon-green); color: #0b0b12; }

    .share-row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    .share-btn { padding: 10px 14px; background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.10); font-weight: 800; }

    @media (max-width: 420px) {
      .grid { gap: 10px; }
      .roulette-btn { font-size: 18px; }
      .action-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="background-comments" id="comments"></div>

  <div class="container">
    <div class="screen">

      <!-- HOME -->
      <div id="home-screen" class="home-wrap active">
        <div class="logo"><span class="line">はしご酒<br>ルーレット</span></div>
        <div class="catch">今日はここでは終われないだろ！？</div>
        <div id="location-badge" class="location-badge">📍 位置情報を取得中...</div>
        <div class="sub">何で決める？</div>
        <div class="grid">
          <button class="roulette-btn" onclick="startRoulette('距離')">距離</button>
          <button class="roulette-btn" onclick="startRoulette('予算')">予算</button>
          <button class="roulette-btn" onclick="startRoulette('評価')">評価</button>
          <button class="roulette-btn" onclick="startRoulette('汚さ')">汚さ</button>
        </div>
        <div class="sns">
          <span>X</span><span>Instagram</span><span>Threads</span>
        </div>
      </div>

      <!-- ROULETTE -->
      <div id="roulette-screen" class="roulette-screen">
        <div class="roulette-label" id="roulette-label">検索中...</div>
        <div class="roulette-ui" aria-label="roulette">
          <div class="roulette-pointer"></div>
          <div class="roulette-wheel" id="roulette-wheel"></div>
          <div class="dart-hit" id="dart-hit"></div>
        </div>
        <div class="roulette-status" id="roulette-status"></div>
      </div>

      <!-- RESULT -->
      <div id="result-screen" class="result-screen">
        <div class="result-card">
          <div class="typing-line" id="typing-line"></div>
          <div class="store-desc" id="store-desc"></div>
          <div class="store-details" id="store-details"></div>
          <div class="action-title">どうする？</div>
          <div class="action-buttons">
            <a id="btn-tabelog" class="action-btn" href="#" target="_blank" rel="noopener">🍽 食べログで見る</a>
            <a id="btn-tel"     class="action-btn tel-btn" href="#" style="display:none">📞 電話して予約</a>
            <button class="action-btn ghost" onclick="retry()">やり直す</button>
          </div>
          <div class="share-row">
            <button class="share-btn" onclick="shareResult()">X でシェア</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── 流れるコメント ──
    const COMMENTS = [
      'レバーで人生変わった','終電、終了','床ベタベタで草','店主クセ強',
      'ハイボール濃すぎ','ここ焼き鳥エグい','隣のおじさん奢ってくれた',
      'もう帰れない','3軒目からが本番','トイレ狭すぎ','常連率92%',
      '優勝です','これが東京の夜','深夜テンション突入','明日仕事です',
      '串がデカい','酒が止まらん','伝説始まった'
    ];
    const commentContainer = document.getElementById('comments');
    function createComment(text) {
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerText = text;
      div.style.top = Math.random() * 100 + '%';
      div.style.animationDuration = (8 + Math.random() * 12) + 's';
      div.style.fontSize = (12 + Math.random() * 12) + 'px';
      commentContainer.appendChild(div);
      setTimeout(() => div.remove(), 20000);
    }
    setInterval(() => createComment(COMMENTS[Math.floor(Math.random() * COMMENTS.length)]), 700);

    // ── フォールバック用ダミーデータ ──
    const FALLBACK_STORES = [
      { name: '赤ちょうちん酒場', type: 'bar',        lat: null, lon: null, dist: null },
      { name: '大衆ホルモン なみだ橋', type: 'izakaya', lat: null, lon: null, dist: null },
      { name: '深夜立ち飲み パンチ', type: 'bar',      lat: null, lon: null, dist: null },
      { name: '酒場コスモ',           type: 'pub',      lat: null, lon: null, dist: null },
      { name: 'ニュー大衆 あぶく',    type: 'izakaya',  lat: null, lon: null, dist: null },
    ];

    const TYPE_LABEL = { bar: 'バー', pub: 'パブ', izakaya: '居酒屋', restaurant: 'レストラン' };

    const MESSAGES = ['行っちゃう！','…終電までだぜ','俺のおごりだ！','今夜は優勝でしょ','胃袋、起きてる？'];
    const RETRY_MSG = ['逃げたな？','今日は守りか〜','まだビビってる','お前、チェーン店派だろ'];

    // ── DOM ──
    const home          = document.getElementById('home-screen');
    const rouletteScr   = document.getElementById('roulette-screen');
    const resultScr     = document.getElementById('result-screen');
    const wheel         = document.getElementById('roulette-wheel');
    const dartHit       = document.getElementById('dart-hit');
    const typingLine    = document.getElementById('typing-line');
    const storeDesc     = document.getElementById('store-desc');
    const rouletteLabel = document.getElementById('roulette-label');
    const rouletteStatus= document.getElementById('roulette-status');
    const messageEl     = document.getElementById('message');
    const locationBadge = document.getElementById('location-badge');

    // ── 状態 ──
    let userLoc      = null;   // { lat, lon }
    let cachedPlaces = null;   // 取得済みの店リスト
    let currentStore = null;
    let currentType  = '';
    let typingTimer  = null;
    let isBusy       = false;

    // ── 距離計算（m）──
    function calcDist(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const dφ = (lat2 - lat1) * Math.PI / 180;
      const dλ = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ/2)**2;
      return Math.round(2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // ── 位置情報取得 ──
    async function getLocation() {
      if (userLoc) return userLoc;
      return new Promise(resolve => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          pos => {
            userLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            resolve(userLoc);
          },
          () => resolve(null),
          { timeout: 8000, maximumAge: 300000 }
        );
      });
    }

    // ── Overpass API で1km以内の飲み屋を取得 ──
    async function fetchNearbyPlaces(lat, lon) {
      if (cachedPlaces) return cachedPlaces;
      const q = `[out:json][timeout:12];(node["amenity"~"^(bar|pub|izakaya|restaurant)$"](around:1000,${lat},${lon}););out body;`;
      try {
        const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
        const data = await res.json();
        const places = data.elements
          .filter(e => e.tags?.name)
          .map(e => ({
            name:    e.tags.name,
            type:    e.tags.amenity,
            lat:     e.lat,
            lon:     e.lon,
            dist:    calcDist(lat, lon, e.lat, e.lon),
            phone:   e.tags.phone || e.tags['contact:phone'] || null,
            address: [e.tags['addr:street'], e.tags['addr:housenumber']].filter(Boolean).join(' ') || null,
          }));
        cachedPlaces = places;
        return places;
      } catch {
        return [];
      }
    }

    // ── 画面切替 ──
    function showScreen(id) {
      home.classList.remove('active');
      rouletteScr.classList.remove('active');
      resultScr.classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    // ── タイピング演出 ──
    function animateTyping(storeName) {
      clearTimeout(typingTimer);
      typingLine.innerHTML = '_<span class="cursor">|</span>';
      const glitch = 'けんさくちゅう';
      const target = storeName;
      let idx = 0;
      const glitchFrames = ['_','_','__','_','＿','_','__'];
      const step = () => {
        if (idx < glitchFrames.length) {
          typingLine.innerHTML = `${glitchFrames[idx]}<span class="cursor">|</span>`;
          idx++;
          typingTimer = setTimeout(step, 120);
          return;
        }
        let typed = '';
        let i = 0;
        const typeChar = () => {
          if (i < glitch.length) {
            typed += glitch[i++];
            typingLine.innerHTML = `${typed}<span class="cursor">|</span>`;
            typingTimer = setTimeout(typeChar, 65);
          } else {
            typingTimer = setTimeout(() => {
              let r = 0;
              const reveal = setInterval(() => {
                typingLine.innerHTML = `${target.slice(0, r)}<span class="cursor">|</span>`;
                if (++r > target.length) { clearInterval(reveal); typingLine.innerHTML = target; }
              }, 80);
            }, 260);
          }
        };
        typeChar();
      };
      step();
    }

    // ── ルーレット本体 ──
    async function startRoulette(type) {
      if (isBusy) return;
      isBusy = true;
      currentType = type;
      messageEl.innerText = '';
      dartHit.classList.remove('show');
      wheel.classList.remove('roulette-spin');
      wheel.style.transform = 'rotate(0deg)';

      showScreen('roulette-screen');
      rouletteLabel.innerText = '📍 位置情報を取得中...';
      rouletteStatus.innerText = '';

      // 1. 位置情報
      const loc = await getLocation();
      let places = [];
      let useReal = false;

      if (loc) {
        rouletteLabel.innerText = '🔍 近くのお店を検索中...';
        places = await fetchNearbyPlaces(loc.lat, loc.lon);
        useReal = places.length > 0;
      }

      // 2. 条件で絞り込み
      let pool = useReal ? places : FALLBACK_STORES;

      if (useReal) {
        if (type === '距離') {
          pool = [...places].sort((a, b) => a.dist - b.dist);
        } else if (type === '汚さ') {
          const dive = places.filter(p => p.type === 'bar' || p.type === 'pub' || p.type === 'izakaya');
          if (dive.length > 0) pool = dive;
        } else if (type === '予算') {
          // 安さ重視 = 居酒屋・バー優先
          const cheap = places.filter(p => p.type !== 'restaurant');
          if (cheap.length > 0) pool = cheap;
        }
      }

      currentStore = pool[Math.floor(Math.random() * pool.length)];
      isBusy = false;

      // 3. スピン
      rouletteLabel.innerText = 'ルーレット回転中...';
      rouletteStatus.innerText = useReal
        ? `1km以内・${type}で選出中`
        : `${type}で選出中（デモモード）`;

      const spins = 4 + Math.floor(Math.random() * 3);
      const finalRot = 360 * spins + Math.random() * 360;
      wheel.style.setProperty('--final-rotation', `${finalRot}deg`);
      requestAnimationFrame(() => wheel.classList.add('roulette-spin'));

      setTimeout(() => {
        dartHit.classList.add('show');
        rouletteLabel.innerText = '決定！';
        rouletteStatus.innerText = useReal
          ? `${currentStore.dist}m先 ・ ${TYPE_LABEL[currentStore.type] || 'お店'}`
          : `${type}で選出（デモ）`;
      }, 1800);

      setTimeout(() => {
        showScreen('result-screen');
        const label = useReal
          ? `${TYPE_LABEL[currentStore.type] || 'お店'} ・ ${currentStore.dist}m ・ ${type}で選出`
          : `${type}で選出（デモモード）`;
        storeDesc.innerText = label;
        animateTyping(currentStore.name);

        // 店舗詳細を表示
        const details = document.getElementById('store-details');
        details.innerHTML = '';
        if (currentStore.address) {
          details.innerHTML += `<div class="store-detail-row">📍 ${currentStore.address}</div>`;
        }
        if (currentStore.phone) {
          details.innerHTML += `<div class="store-detail-row">📞 <a href="tel:${currentStore.phone.replace(/[^\d+]/g,'')}">${currentStore.phone}</a></div>`;
        }

        // 電話ボタン（番号があるときだけ表示）
        const telBtn = document.getElementById('btn-tel');
        if (currentStore.phone) {
          telBtn.href = `tel:${currentStore.phone.replace(/[^\d+]/g,'')}`;
          telBtn.style.display = 'block';
        } else {
          telBtn.style.display = 'none';
        }

        // 食べログボタン
        document.getElementById('btn-tabelog').href =
          `https://tabelog.com/rstLst/food/${encodeURIComponent(currentStore.name)}/`;
      }, 2100);
    }

    // ── 行っちゃう ──
    function shareResult() {
      const text = `【はしご酒ルーレット】${currentStore?.name || '次の店'} に行ってきます🍺`;
      const url = location.href;
      if (navigator.share) { navigator.share({ title: 'はしご酒ルーレット', text, url }).catch(() => {}); return; }
      location.href = `https://x.com/intent/tweet?text=${encodeURIComponent(text + '\n' + url)}`;
    }

    // ── やり直す ──
    function retry() {
      messageEl.innerText = RETRY_MSG[Math.floor(Math.random() * RETRY_MSG.length)];
      setTimeout(() => {
        showScreen('home-screen');
        messageEl.innerText = '';
        typingLine.innerText = '';
      }, 1000);
    }

    // ── シェア ──

    // ── 起動時：位置情報を先取り ──
    (async () => {
      const loc = await getLocation();
      if (loc) {
        locationBadge.textContent = '📍 位置情報OK（1km圏内で検索します）';
        // バックグラウンドで店リストを先読み
        fetchNearbyPlaces(loc.lat, loc.lon).then(places => {
          if (places.length > 0) {
            locationBadge.textContent = `📍 近くに ${places.length} 件のお店が見つかりました`;
          } else {
            locationBadge.textContent = '📍 近くに登録店なし（デモモードで動作）';
          }
        });
      } else {
        locationBadge.textContent = '⚠️ 位置情報なし（デモモードで動作）';
        locationBadge.classList.add('denied');
      }
    })();
  </script>
</body>
</html>
